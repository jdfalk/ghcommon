# file: .github/workflows/reusable-burndown.yml
# version: 1.8.0
# Reusable per-repo burndown workflow — lives in ghcommon, called from every repo.
#
# Usage:
#   jobs:
#     burndown:
#       uses: falkcorp/github-common/.github/workflows/reusable-burndown.yml@main
#       with:
#         mode: dry-run
#       secrets: inherit
#
# Pre-flight (free): GitHub App JWT → count ready tasks in hub repo. No AI calls.
# Exits early if none found. Otherwise: triage → dispatch (matrix) → aggregate.
#
# The burndown binary is pre-baked into
# ghcr.io/falkcorp/burndown-runner-image:bootstrap at /usr/local/bin/burndown.
# Config is driven entirely by environment variables — no config.yaml needed.

name: Burndown (reusable)

on:
  workflow_call:
    inputs:
      mode:
        description: 'dry-run | draft-only | full'
        type: string
        default: dry-run
      hub_repo:
        description: 'GitHub repo holding burndown task issues'
        type: string
        default: falkcorp/burndown-tasks
      label_prefix:
        description: 'Label prefix routing tasks to repos'
        type: string
        default: 'repo:'
      implementer_provider:
        description: 'openai | anthropic'
        type: string
        default: openai
      triage_model:
        description: 'OpenAI model for triage (default: o4-mini)'
        type: string
        default: o4-mini
      cheapest_only:
        description: 'Use cheapest single model with no tier escalation'
        type: boolean
        default: false
      powerful_only:
        description: 'Use most powerful model only'
        type: boolean
        default: false
      task_filter:
        description: 'Task subset to collect: "" (normal nightly) | "failed-batch" (hard run)'
        type: string
        default: ''
    secrets:
      BURNDOWN_BOT_APP_ID:
        required: true
      BURNDOWN_BOT_INSTALLATION_ID:
        required: true
      BURNDOWN_BOT_PRIVATE_KEY:
        required: true
      BURNDOWN_BOT_CLAUDE_API_KEY:
        required: false
      BURNDOWN_BOT_OPENAI_API_KEY:
        required: false

permissions:
  contents: read

concurrency:
  group: burndown-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight — free. JWT → installation token → count ready tasks.
  # All downstream jobs are skipped when count == 0.
  # ---------------------------------------------------------------------------
  preflight:
    name: Check for ready tasks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_tasks: ${{ steps.count.outputs.has_tasks }}
      task_count: ${{ steps.count.outputs.task_count }}
    steps:
      - name: Count ready tasks
        id: count
        env:
          APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
          HUB_REPO: ${{ inputs.hub_repo }}
          LABEL_PREFIX: ${{ inputs.label_prefix }}
        run: |
          pip install -q PyJWT cryptography
          python3 - <<'PYEOF'
          import jwt, time, os, urllib.request, urllib.parse, json

          pem        = os.environ["PRIVATE_KEY"]
          app_id     = int(os.environ["APP_ID"])
          install_id = os.environ["INSTALLATION_ID"]
          repo_name  = os.environ["REPO_NAME"]
          hub_repo   = os.environ["HUB_REPO"]
          prefix     = os.environ["LABEL_PREFIX"]

          now = int(time.time())
          jwt_tok = jwt.encode({"iat": now - 60, "exp": now + 540, "iss": app_id},
                               pem, algorithm="RS256")

          req = urllib.request.Request(
              f"https://api.github.com/app/installations/{install_id}/access_tokens",
              method="POST",
              headers={
                  "Authorization": f"Bearer {jwt_tok}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Length": "0",
              },
          )
          inst_token = json.loads(urllib.request.urlopen(req).read())["token"]

          labels = urllib.parse.quote(f"{prefix}{repo_name},status:ready")
          url = (f"https://api.github.com/repos/{hub_repo}/issues"
                 f"?labels={labels}&state=open&per_page=100")
          req2 = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {inst_token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          count = len(json.loads(urllib.request.urlopen(req2).read()))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"task_count={count}\n")
              f.write(f"has_tasks={'true' if count else 'false'}\n")

          sym = "✓" if count else "○"
          msg = "proceeding" if count else "nothing to do — exiting"
          print(f"{sym} {count} ready task(s) for '{repo_name}' — {msg}")
          PYEOF

  # ---------------------------------------------------------------------------
  # Triage — classify tasks. Only when pre-flight found work.
  # ---------------------------------------------------------------------------
  triage:
    name: Triage tasks
    needs: preflight
    if: needs.preflight.outputs.has_tasks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/falkcorp/burndown-runner-image:483ee343bc56a4ceec28180b336409a96bb56400
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.JF_CI_GH_PAT || secrets.GITHUB_TOKEN }}
    outputs:
      task_indices: ${{ steps.emit.outputs.task_indices }}
      task_count: ${{ steps.emit.outputs.task_count }}
    steps:
      - name: Checkout target repo (sparse)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: targets/${{ github.event.repository.name }}
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Materialize App key
        env:
          PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys" && chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Run triage
        env:
          MODE: ${{ inputs.mode }}
          WORKSPACE: ${{ github.workspace }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          IMPLEMENTER_PROVIDER: ${{ inputs.implementer_provider }}
          TRIAGE_MODEL: ${{ inputs.triage_model }}
          CHEAPEST_ONLY: ${{ inputs.cheapest_only }}
          POWERFUL_ONLY: ${{ inputs.powerful_only }}
          TASK_FILTER: ${{ inputs.task_filter }}
          GH_APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          GH_APP_PEM_PATH: ${{ runner.temp }}/keys/burndown-bot.pem
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BURNDOWN_BOT_CLAUDE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/burndown-state" "$RUNNER_TEMP/burndown-digest"
          /usr/local/bin/burndown triage --from-env \
            --out "$RUNNER_TEMP/tasks.json"

      - name: Stage triage for artifact upload
        run: |
          mkdir -p "$RUNNER_TEMP/triage-stage"
          cp "$RUNNER_TEMP/tasks.json" "$RUNNER_TEMP/triage-stage/tasks.json"

      - name: Upload triage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage-stage/
          retention-days: 7

      - name: Emit task indices for matrix
        id: emit
        run: |
          count=$(jq '.tasks | length' "$RUNNER_TEMP/tasks.json")
          [ "$count" -gt 256 ] && count=256
          if [ "$count" -eq 0 ]; then
            indices='[]'
          else
            indices=$(jq -cn --argjson n "$count" '[range(0;$n)]')
          fi
          echo "task_count=$count"     >> "$GITHUB_OUTPUT"
          echo "task_indices=$indices" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Dispatch — matrix fan-out, max 4 parallel.
  # ---------------------------------------------------------------------------
  dispatch:
    name: 'Dispatch task ${{ matrix.index }}'
    needs: triage
    if: needs.triage.outputs.task_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/falkcorp/burndown-runner-image:483ee343bc56a4ceec28180b336409a96bb56400
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.JF_CI_GH_PAT || secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        index: ${{ fromJson(needs.triage.outputs.task_indices) }}
    steps:
      - name: Checkout target repo (sparse)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: targets/${{ github.event.repository.name }}
          fetch-depth: 1
          sparse-checkout: |
            /*
            !/testdata/audio/
          sparse-checkout-cone-mode: false

      - name: Download triage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Materialize App key
        env:
          PRIVATE_KEY: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys" && chmod 700 "$RUNNER_TEMP/keys"
          printf '%s\n' "$PRIVATE_KEY" > "$RUNNER_TEMP/keys/burndown-bot.pem"
          chmod 600 "$RUNNER_TEMP/keys/burndown-bot.pem"

      - name: Dispatch task ${{ matrix.index }}
        env:
          MODE: ${{ inputs.mode }}
          WORKSPACE: ${{ github.workspace }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          IMPLEMENTER_PROVIDER: ${{ inputs.implementer_provider }}
          CHEAPEST_ONLY: ${{ inputs.cheapest_only }}
          POWERFUL_ONLY: ${{ inputs.powerful_only }}
          TASK_FILTER: ${{ inputs.task_filter }}
          GH_APP_ID: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          GH_APP_INSTALLATION_ID: ${{ secrets.BURNDOWN_BOT_INSTALLATION_ID }}
          GH_APP_PEM_PATH: ${{ runner.temp }}/keys/burndown-bot.pem
          OPENAI_API_KEY: ${{ secrets.BURNDOWN_BOT_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BURNDOWN_BOT_CLAUDE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/burndown-state"
          /usr/local/bin/burndown dispatch-one --from-env \
            --task-file "$RUNNER_TEMP/triage/tasks.json" \
            --task-index ${{ matrix.index }} \
            --out "$RUNNER_TEMP/outcome-${{ matrix.index }}.json"

      - name: Upload outcome
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: burndown-outcome-${{ matrix.index }}
          path: ${{ runner.temp }}/outcome-${{ matrix.index }}.json
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Aggregate — always runs after triage; builds digest even on partial failure.
  # ---------------------------------------------------------------------------
  aggregate:
    name: Aggregate digest
    needs: [triage, dispatch]
    if: always() && needs.triage.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/falkcorp/burndown-runner-image:483ee343bc56a4ceec28180b336409a96bb56400
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.JF_CI_GH_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Download triage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: burndown-triage
          path: ${{ runner.temp }}/triage

      - name: Download outcome artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: burndown-outcome-*
          merge-multiple: true
          path: ${{ runner.temp }}/outcomes
        continue-on-error: true

      - name: Aggregate
        env:
          MODE: ${{ inputs.mode }}
          WORKSPACE: ${{ github.workspace }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p "$RUNNER_TEMP/digest"
          triage_json="$RUNNER_TEMP/triage/tasks.json"
          if [ ! -f "$triage_json" ]; then
            # shellcheck disable=SC2016
            printf '## Burndown — no tasks dispatched\n\nMode: `%s`. All classified tasks were dry-run-only.\n' \
              "$MODE" > "$RUNNER_TEMP/digest/digest.md"
            exit 0
          fi
          /usr/local/bin/burndown aggregate --from-env \
            --triage-file "$triage_json" \
            --outcomes-dir "$RUNNER_TEMP/outcomes" \
            --digest-out "$RUNNER_TEMP/digest/digest.md"

      - name: Publish digest to job summary
        if: always()
        run: |
          if [ -s "$RUNNER_TEMP/digest/digest.md" ]; then
            cat "$RUNNER_TEMP/digest/digest.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## No digest produced" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: burndown-digest-${{ github.run_id }}
          path: ${{ runner.temp }}/digest/
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Decompose — only on hard runs (task_filter=failed-batch). Reads any
  # [failed-batch-hard] items from TODO.md and asks Claude Haiku to split
  # each into 3-5 subtasks. Opens a PR with the result.
  # ---------------------------------------------------------------------------
  decompose:
    name: Decompose failed-batch-hard tasks
    needs: [aggregate]
    if: always() && inputs.task_filter == 'failed-batch' && needs.aggregate.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/falkcorp/burndown-runner-image:483ee343bc56a4ceec28180b336409a96bb56400
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.JF_CI_GH_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ secrets.BURNDOWN_BOT_APP_ID }}
          private-key: ${{ secrets.BURNDOWN_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout target repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Run decompose
        env:
          ANTHROPIC_API_KEY: ${{ secrets.BURNDOWN_BOT_CLAUDE_API_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          /usr/local/bin/burndown decompose --repo-path "$GITHUB_WORKSPACE"

      - name: Open PR if TODO.md changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git -C "$GITHUB_WORKSPACE" diff --quiet HEAD -- TODO.md; then
            echo "No [failed-batch-hard] items found or no changes — skipping PR."
            exit 0
          fi
          BRANCH="auto/decompose-$(date +%Y%m%d-%H%M%S)"
          git -C "$GITHUB_WORKSPACE" config user.name  "burndown-bot[bot]"
          git -C "$GITHUB_WORKSPACE" config user.email "burndown-bot[bot]@users.noreply.github.com"
          git -C "$GITHUB_WORKSPACE" checkout -b "$BRANCH"
          git -C "$GITHUB_WORKSPACE" add TODO.md
          git -C "$GITHUB_WORKSPACE" commit -m "chore(todo): decompose [failed-batch-hard] tasks into subtasks"
          git -C "$GITHUB_WORKSPACE" push origin "$BRANCH"
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --title "chore(todo): decompose failed-batch-hard tasks into subtasks" \
            --body "Auto-generated by \`burndown decompose\`. Each \`[failed-batch-hard]\` item has been split into 3-5 smaller subtasks by Claude Haiku. Review subtask scoping before merging." \
            --label "burndown-bot"
