# file: .github/workflows/release-go.yml
# version: 2.4.0
# guid: release-go-workflow-2025-10

name: Go Release Build

on:
  workflow_call:
    inputs:
      go-matrix:
        description: 'JSON encoded Go build matrix'
        required: true
        type: string
      protobuf-artifacts:
        description: 'Whether protobuf artifacts were generated'
        required: false
        type: string
        default: 'false'
      release-version:
        description: 'Release version to embed in binaries'
        required: false
        type: string
        default: ''
      system-packages:
        description: 'Space-separated list of apt packages to install before build (e.g. libtag1-dev)'
        required: false
        type: string
        default: ''
      pre-build-script:
        description: 'Shell script to run before goreleaser (e.g. build frontend assets)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  build-go:
    name: Build Go Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download protobuf artifacts
        if: inputs.protobuf-artifacts == 'true'
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: protobuf-generated
          path: proto-generated

      - name: Install system packages
        if: inputs.system-packages != ''
        env:
          PACKAGES: ${{ inputs.system-packages }}
        run: sudo apt-get update && sudo apt-get install -y $PACKAGES

      - name: Run pre-build script
        if: inputs.pre-build-script != ''
        run: ${{ inputs.pre-build-script }}

      - name: Build and release Go via GoReleaser
        uses: jdfalk/release-go-action@7b73a664a71c92c7cc44453a33a5dcfb898751ef # v2.0.3
        with:
          module-path: .
          tag: ${{ inputs.release-version || github.ref_name }}
          go-version: '1.24'
          run-tests: 'false'
          run-linters: 'true'
          create-release: 'true'
          skip-publish: 'false'

      - name: Upload Go artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-binaries
          path: dist/**
          if-no-files-found: error
          retention-days: 7
