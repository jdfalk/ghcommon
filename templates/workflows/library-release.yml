# file: templates/workflows/library-release.yml
# Library/Package Release Template
# This template is for libraries, packages, or tools that need semantic versioning and releases
# Copy this to .github/workflows/ in your repository and customize as needed

name: Library Release

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Test and validate
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Customize based on your language/runtime
        version: ['18', '20', '21'] # Node.js versions
        # python-version: ['3.8', '3.9', '3.10', '3.11']  # Python versions
        # go-version: ['1.19', '1.20', '1.21']  # Go versions

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.version }}
          cache: 'npm'

      # Customize based on your language
      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

      - name: Generate coverage report
        run: npm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Version calculation
  versioning:
    name: Calculate Version
    uses: jdfalk/ghcommon/.github/workflows/reusable-semantic-versioning.yml@83352d45a93951d4e490a5c310e31858a52e29ce # v1.10.5-rc.2
    needs: [test]
    with:
      dry-run: ${{ github.event_name == 'pull_request' }}
      version-files: '["package.json", "package-lock.json"]' # Customize for your language
      update-pr-title: true
    secrets: inherit

  # Build package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, versioning]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Package for distribution
        run: |
          npm pack
          tar -czf dist.tar.gz dist/

      - name: Generate checksums
        run: sha256sum *.tgz dist.tar.gz > checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package-${{ github.sha }}
          path: |
            *.tgz
            dist.tar.gz
            checksums.txt
          retention-days: 30

  # Create release
  release:
    name: Create Release
    uses: jdfalk/ghcommon/.github/workflows/automatic-release.yml@83352d45a93951d4e490a5c310e31858a52e29ce # v1.10.5-rc.2
    needs: [versioning, build]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.versioning.outputs.should-release == 'true'
    with:
      release-type: auto
      generate-notes: true
      include-artifacts: true
      artifact-patterns: '["*.tgz", "*.tar.gz", "checksums.txt"]'
    secrets: inherit

  # Publish to package registry
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.result == 'success'
    environment: npm # Use environment protection for publishing
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

        # Example for other package managers:
        # - name: Publish to PyPI (Python)
        #   env:
        #     TWINE_USERNAME: __token__
        #     TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        #   run: |
        #     python -m pip install --upgrade twine
        #     python -m twine upload dist/*

        # - name: Publish to Go Proxy (Go)
        #   run: |
        #     GOPROXY=proxy.golang.org go list -m github.com/${{ github.repository }}@${{ needs.release.outputs.release-tag }}
